<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fear & Greed Meter</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Sora:wght@500;700&display=swap");
    :root {
      --ink: #f7f2e9;
      --muted: #c6bca8;
      --bg: #0f1116;
      --bg2: #1d2330;
      --card: rgba(28, 32, 42, 0.76);
      --line: rgba(255, 255, 255, 0.11);
      --fear: #ff5a47;
      --neutral: #ffd56f;
      --greed: #4be39b;
      --accent: #6ec7ff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      font-family: "Space Grotesk", sans-serif;
      background:
        radial-gradient(1000px 500px at 12% -10%, #6c4025 0, transparent 60%),
        radial-gradient(900px 500px at 90% 10%, #203b63 0, transparent 60%),
        linear-gradient(140deg, var(--bg), var(--bg2));
      min-height: 100vh;
    }
    .wrap { max-width: 1080px; margin: 0 auto; padding: 26px 18px 40px; }
    .hero { display: flex; gap: 20px; align-items: center; justify-content: space-between; flex-wrap: wrap; }
    h1 { margin: 0; font: 700 2rem/1 "Sora", sans-serif; letter-spacing: 0.4px; }
    .sub { color: var(--muted); margin: 8px 0 0; }
    .pill { border: 1px solid var(--line); padding: 8px 12px; border-radius: 999px; color: var(--muted); font-size: 0.9rem; }
    .grid { margin-top: 18px; display: grid; grid-template-columns: 1.2fr 1fr; gap: 16px; }
    .card { background: var(--card); border: 1px solid var(--line); border-radius: 18px; padding: 16px; backdrop-filter: blur(6px); }
    .meter-wrap { display: grid; grid-template-columns: 220px 1fr; gap: 18px; align-items: center; }
    .gauge {
      width: 220px; height: 220px; border-radius: 50%;
      background: conic-gradient(var(--fear), #ff9250, var(--neutral), #92f0b7, var(--greed));
      padding: 12px; position: relative; box-shadow: 0 20px 45px rgba(0, 0, 0, 0.35);
      animation: float 5s ease-in-out infinite;
    }
    .gauge::before {
      content: ""; position: absolute; inset: 12px; border-radius: 50%;
      background: #111723; border: 1px solid var(--line);
    }
    .needle {
      position: absolute; left: 50%; top: 50%;
      width: 4px; height: 84px; transform-origin: bottom center;
      background: linear-gradient(var(--accent), #ffffff); border-radius: 4px;
      transform: translate(-50%, -100%) rotate(-90deg);
      transition: transform 0.6s cubic-bezier(.23,.9,.25,1.2);
      z-index: 3;
    }
    .hub {
      position: absolute; left: 50%; top: 50%; width: 16px; height: 16px;
      transform: translate(-50%, -50%); border-radius: 50%; background: #fff; z-index: 4;
      box-shadow: 0 0 0 5px rgba(255,255,255,.14);
    }
    .score { font: 700 3rem/1 "Sora", sans-serif; margin: 0; }
    .label { font-size: 1.3rem; margin: 4px 0; }
    .signal { color: var(--muted); }
    .sparkline { width: 100%; height: 100px; display: block; }
    .row { display: flex; justify-content: space-between; align-items: center; gap: 10px; }
    .cols { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 16px; }
    .list { list-style: none; margin: 10px 0 0; padding: 0; display: grid; gap: 8px; }
    .list li { border: 1px solid var(--line); border-radius: 10px; padding: 8px 10px; }
    .challenge { display: flex; justify-content: space-between; align-items: center; gap: 10px; }
    .btn {
      border: 1px solid var(--line); background: #182132; color: var(--ink);
      border-radius: 10px; padding: 7px 10px; cursor: pointer; font-family: inherit;
    }
    .btn:hover { border-color: rgba(255,255,255,.35); }
    .sliders { display: grid; gap: 10px; margin-top: 8px; }
    .sliders label { display: grid; gap: 4px; color: var(--muted); font-size: 0.92rem; }
    input[type="range"] { width: 100%; accent-color: var(--accent); }
    .tiny { color: var(--muted); font-size: 0.85rem; margin-top: 8px; }
    .auth-input { border: 1px solid var(--line); background: #121826; color: var(--ink); border-radius: 10px; padding: 10px 12px; font-family: inherit; }
    .auth-input.invalid { border-color: var(--fear); box-shadow: 0 0 0 2px rgba(255, 90, 71, 0.18); }
    .auth-error { color: #ffb3a9; font-size: 0.82rem; min-height: 1em; }
    .auth-state-error { color: #ffb3a9; }
    .auth-state-ok { color: #9ee9bf; }
    .toasts { position: fixed; right: 16px; bottom: 16px; display: grid; gap: 8px; z-index: 99; }
    .toast { border: 1px solid var(--line); background: #0f1725; color: var(--ink); padding: 10px 12px; border-radius: 10px; min-width: 220px; }
    .toast.ok { border-color: rgba(75, 227, 155, 0.45); }
    .toast.err { border-color: rgba(255, 90, 71, 0.45); }
    @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
    @media (max-width: 920px) {
      .grid { grid-template-columns: 1fr; }
      .meter-wrap { grid-template-columns: 1fr; justify-items: center; text-align: center; }
      .cols { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <div>
        <h1>Fear & Greed Meter</h1>
        <p class="sub">Live pulse + strategy sandbox</p>
      </div>
      <div id="sourceTag" class="pill">Source: --</div>
    </section>

    <section class="grid">
      <article class="card">
        <div class="meter-wrap">
          <div class="gauge">
            <div id="needle" class="needle"></div>
            <div class="hub"></div>
          </div>
          <div>
            <p id="score" class="score">--</p>
            <p id="label" class="label">--</p>
            <p id="signal" class="signal">--</p>
            <svg id="sparkline" class="sparkline" viewBox="0 0 360 100" preserveAspectRatio="none"></svg>
          </div>
        </div>
      </article>

      <article class="card">
        <div class="row">
          <strong>Account</strong>
          <button id="logoutBtn" class="btn">Logout</button>
        </div>
        <div class="sliders">
          <label>Username<input id="authUsername" class="auth-input" type="text" placeholder="player1"></label>
          <p id="usernameErr" class="auth-error"></p>
          <label>Password<input id="authPassword" class="auth-input" type="password" placeholder="min 8 chars"></label>
          <p id="passwordErr" class="auth-error"></p>
        </div>
        <div class="row" style="margin-top:10px;">
          <button id="registerBtn" class="btn">Register</button>
          <button id="loginBtn" class="btn">Login</button>
          <button id="resetGuardsBtn" class="btn">Reset Login Guard</button>
        </div>
        <div class="row" style="margin-top:10px;">
          <button id="forgotBtn" class="btn">Forgot Password</button>
          <button id="resetPwdBtn" class="btn">Reset Password</button>
        </div>
        <div class="sliders">
          <label>Reset Token<input id="resetTokenInput" class="auth-input" type="text" placeholder="paste reset token"></label>
          <label>New Password<input id="newPasswordInput" class="auth-input" type="password" placeholder="Newpass#123"></label>
        </div>
        <p id="authState" class="tiny">Not logged in</p>
      </article>

      <article class="card">
        <div class="row">
          <strong>Interactive Sandbox</strong>
          <button id="syncLive" class="btn">Sync From Live</button>
        </div>
        <div class="sliders">
          <label>News: <span id="newsV">50</span><input id="news" type="range" min="0" max="100" value="50"></label>
          <label>Social: <span id="socialV">50</span><input id="social" type="range" min="0" max="100" value="50"></label>
          <label>Volatility: <span id="volV">50</span><input id="volatility" type="range" min="0" max="100" value="50"></label>
        </div>
        <p class="tiny">Use sliders to simulate market mood and train your contrarian instinct.</p>
      </article>
    </section>

    <section class="cols">
      <article class="card">
        <strong>Leaderboard</strong>
        <ul id="leaderboard" class="list"></ul>
      </article>
      <article class="card">
        <strong>Active Challenges</strong>
        <ul id="challenges" class="list"></ul>
      </article>
    </section>

    <section class="cols">
      <article class="card">
        <div class="row">
          <strong>My Predictions</strong>
          <button id="scorePending" class="btn">Score Pending</button>
        </div>
        <ul id="predictions" class="list"></ul>
      </article>
    </section>

    <section class="cols">
      <article class="card">
        <strong>Manage Challenges</strong>
        <div class="sliders">
          <label>Name<input id="newChallengeName" class="auth-input" type="text" placeholder="Macro Week Call"></label>
          <label>Type<input id="newChallengeType" class="auth-input" type="text" placeholder="macro"></label>
        </div>
        <div class="row" style="margin-top:10px;">
          <button id="createChallengeBtn" class="btn">Create Challenge</button>
        </div>
        <p id="challengeAdminState" class="tiny">Login required</p>
        <ul id="challengeAdminList" class="list"></ul>
      </article>
    </section>
  </div>
  <div id="toasts" class="toasts"></div>

  <script>
    let authToken = null;
    let refreshToken = null;
    let liveLatest = null;
    let authRetryTimer = null;
    let authConfig = { features: { devAuthResetEnabled: false } };

    const scoreEl = document.getElementById('score');
    const labelEl = document.getElementById('label');
    const signalEl = document.getElementById('signal');
    const sourceTag = document.getElementById('sourceTag');
    const needle = document.getElementById('needle');
    const sparkline = document.getElementById('sparkline');
    const sliderNews = document.getElementById('news');
    const sliderSocial = document.getElementById('social');
    const sliderVol = document.getElementById('volatility');
    const newsV = document.getElementById('newsV');
    const socialV = document.getElementById('socialV');
    const volV = document.getElementById('volV');
    const leaderboardEl = document.getElementById('leaderboard');
    const challengesEl = document.getElementById('challenges');
    const predictionsEl = document.getElementById('predictions');
    const authUsernameEl = document.getElementById('authUsername');
    const authPasswordEl = document.getElementById('authPassword');
    const authStateEl = document.getElementById('authState');
    const usernameErrEl = document.getElementById('usernameErr');
    const passwordErrEl = document.getElementById('passwordErr');
    const logoutBtn = document.getElementById('logoutBtn');
    const newChallengeNameEl = document.getElementById('newChallengeName');
    const newChallengeTypeEl = document.getElementById('newChallengeType');
    const createChallengeBtn = document.getElementById('createChallengeBtn');
    const challengeAdminStateEl = document.getElementById('challengeAdminState');
    const challengeAdminListEl = document.getElementById('challengeAdminList');
    const toastsEl = document.getElementById('toasts');
    const resetGuardsBtn = document.getElementById('resetGuardsBtn');
    const forgotBtn = document.getElementById('forgotBtn');
    const resetPwdBtn = document.getElementById('resetPwdBtn');
    const resetTokenInput = document.getElementById('resetTokenInput');
    const newPasswordInput = document.getElementById('newPasswordInput');
    const challengeNameById = new Map();
    let allChallenges = [];

    function clamp(n, min, max) { return Math.max(min, Math.min(max, n)); }
    function showToast(message, type = 'ok') {
      const node = document.createElement('div');
      node.className = `toast ${type === 'error' ? 'err' : 'ok'}`;
      node.textContent = message;
      toastsEl.appendChild(node);
      setTimeout(() => node.remove(), 2400);
    }
    function scoreLabel(score) {
      if (score <= 24) return 'Extreme Fear';
      if (score <= 44) return 'Fear';
      if (score <= 55) return 'Neutral';
      if (score <= 75) return 'Greed';
      return 'Extreme Greed';
    }
    function signalFor(score) {
      if (score >= 76) return 'Consider risk reduction';
      if (score <= 24) return 'Watch for accumulation zones';
      return 'Hold / observe';
    }
    function compute(news, social, volatility) {
      const score = clamp(Math.round(news * 0.35 + social * 0.35 + (100 - volatility) * 0.30), 0, 100);
      return { score, label: scoreLabel(score), contrarianSignal: signalFor(score), components: { news, social, volatility } };
    }
    function paintScore(score) {
      const hue = Math.round((score / 100) * 120);
      scoreEl.style.color = `hsl(${hue}, 80%, 65%)`;
    }
    function render(s, source) {
      scoreEl.textContent = s.score;
      labelEl.textContent = s.label;
      signalEl.textContent = s.contrarianSignal;
      sourceTag.textContent = `Source: ${source || 'unknown'}`;
      needle.style.transform = `translate(-50%, -100%) rotate(${(s.score / 100) * 180 - 90}deg)`;
      paintScore(s.score);
    }
    function drawSpark(values) {
      if (!values.length) return;
      const points = values.map((v, i) => `${(i / Math.max(1, values.length - 1)) * 360},${100 - v}`);
      sparkline.innerHTML =
        '<polyline fill="none" stroke="rgba(255,255,255,.25)" stroke-width="6" points="' + points.join(' ') + '"></polyline>' +
        '<polyline fill="none" stroke="#6ec7ff" stroke-width="2.5" points="' + points.join(' ') + '"></polyline>';
    }
    function updateSandbox() {
      const news = Number(sliderNews.value), social = Number(sliderSocial.value), volatility = Number(sliderVol.value);
      newsV.textContent = news; socialV.textContent = social; volV.textContent = volatility;
      render(compute(news, social, volatility), 'sandbox');
    }

    function setAuthState(text, type) {
      authStateEl.textContent = text;
      authStateEl.classList.remove('auth-state-error', 'auth-state-ok');
      if (type === 'error') authStateEl.classList.add('auth-state-error');
      if (type === 'ok') authStateEl.classList.add('auth-state-ok');
    }

    function updateResetButtonVisibility(user) {
      const isAdmin = Boolean(user && user.role === 'admin');
      const enabled = Boolean(authConfig && authConfig.features && authConfig.features.devAuthResetEnabled);
      resetGuardsBtn.style.display = enabled && isAdmin ? 'inline-block' : 'none';
    }

    function startRetryCountdown(prefix, seconds) {
      if (authRetryTimer) clearInterval(authRetryTimer);
      let remaining = Math.max(1, Number(seconds || 1));
      setAuthState(`${prefix}. Try again in ${remaining}s`, 'error');
      authRetryTimer = setInterval(() => {
        remaining -= 1;
        if (remaining <= 0) {
          clearInterval(authRetryTimer);
          authRetryTimer = null;
          setAuthState('You can try again now');
          return;
        }
        setAuthState(`${prefix}. Try again in ${remaining}s`, 'error');
      }, 1000);
    }

    function validateUsername(username) {
      if (!username) return 'Username is required';
      if (!/^[a-zA-Z0-9_]{3,32}$/.test(username)) return 'Use 3-32 chars: letters, numbers, underscore';
      return '';
    }

    function validatePassword(password) {
      if (!password) return 'Password is required';
      if (password.length < 8) return 'Password must be at least 8 chars';
      if (password.length > 128) return 'Password must be at most 128 chars';
      if (!/[a-z]/.test(password)) return 'Include a lowercase letter';
      if (!/[A-Z]/.test(password)) return 'Include an uppercase letter';
      if (!/[0-9]/.test(password)) return 'Include a number';
      if (!/[^A-Za-z0-9]/.test(password)) return 'Include a symbol';
      return '';
    }

    function paintFieldState(inputEl, errorEl, message) {
      errorEl.textContent = message || '';
      inputEl.classList.toggle('invalid', Boolean(message));
    }

    function validateAuthForm() {
      const username = authUsernameEl.value.trim();
      const password = authPasswordEl.value;
      const userErr = validateUsername(username);
      const passErr = validatePassword(password);
      paintFieldState(authUsernameEl, usernameErrEl, userErr);
      paintFieldState(authPasswordEl, passwordErrEl, passErr);
      return !userErr && !passErr;
    }

    function setAuthToken(token) {
      authToken = token || null;
      if (authToken) localStorage.setItem('fg_token', authToken);
      else localStorage.removeItem('fg_token');
    }

    function setRefreshToken(token) {
      refreshToken = token || null;
      if (refreshToken) localStorage.setItem('fg_refresh_token', refreshToken);
      else localStorage.removeItem('fg_refresh_token');
    }

    async function refreshSession() {
      if (!refreshToken) return false;
      const res = await fetch('/api/auth/refresh', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ refreshToken })
      });
      if (!res.ok) {
        setAuthToken(null);
        setRefreshToken(null);
        return false;
      }
      const data = await res.json().catch(() => ({}));
      if (!data.accessToken || !data.refreshToken) return false;
      setAuthToken(data.accessToken);
      setRefreshToken(data.refreshToken);
      return true;
    }

    async function apiFetch(path, options = {}, authRequired = false) {
      const headers = { ...(options.headers || {}) };
      if (authToken) headers.Authorization = `Bearer ${authToken}`;
      let res = await fetch(path, { ...options, headers });
      if (authRequired && res.status === 401) {
        const refreshed = await refreshSession();
        if (!refreshed) return res;
        const retryHeaders = { ...(options.headers || {}), Authorization: `Bearer ${authToken}` };
        res = await fetch(path, { ...options, headers: retryHeaders });
      }
      return res;
    }

    async function fetchMe() {
      if (!authToken) return null;
      const meRes = await fetch('/api/auth/me', {
        headers: { 'Authorization': `Bearer ${authToken}` }
      });
      if (!meRes.ok) return null;
      const me = await meRes.json();
      return me && me.user ? me.user : null;
    }

    async function fetchAuthConfig() {
      const res = await fetch('/api/auth/config');
      if (!res.ok) return;
      const data = await res.json().catch(() => null);
      if (data && data.features) authConfig = data;
    }

    async function register() {
      const username = authUsernameEl.value.trim();
      const password = authPasswordEl.value;
      if (!validateAuthForm()) {
        setAuthState('Please fix the highlighted fields', 'error');
        return;
      }
      const res = await fetch('/api/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) {
        if (res.status === 429 && data.retryAfter) {
          startRetryCountdown('Register blocked', data.retryAfter);
        } else {
          setAuthState(`Register failed: ${data.error || 'unknown error'}`, 'error');
        }
        showToast('Register failed', 'error');
        return;
      }
      setAuthState('Registered. Please login.', 'ok');
      showToast('Registered successfully');
    }

    async function forgotPassword() {
      const username = authUsernameEl.value.trim();
      if (!username) {
        setAuthState('Enter username for reset', 'error');
        return;
      }
      const res = await fetch('/api/auth/password/forgot', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username })
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) {
        setAuthState(data.error || 'Forgot password failed', 'error');
        showToast(data.error || 'Forgot password failed', 'error');
        return;
      }
      if (data.devResetToken) {
        resetTokenInput.value = data.devResetToken;
        setAuthState('Dev reset token generated and filled', 'ok');
      } else {
        setAuthState('If username exists, reset instructions were issued', 'ok');
      }
      showToast('Password reset request accepted');
    }

    async function resetPassword() {
      const token = resetTokenInput.value.trim();
      const newPassword = newPasswordInput.value;
      const passErr = validatePassword(newPassword);
      if (!token) {
        setAuthState('Reset token is required', 'error');
        return;
      }
      if (passErr) {
        setAuthState(passErr, 'error');
        return;
      }
      const res = await fetch('/api/auth/password/reset', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, newPassword })
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) {
        setAuthState(data.error || 'Password reset failed', 'error');
        showToast(data.error || 'Password reset failed', 'error');
        return;
      }
      resetTokenInput.value = '';
      newPasswordInput.value = '';
      authPasswordEl.value = '';
      setAuthState('Password reset successful. Login with new password', 'ok');
      showToast('Password reset successful');
    }

    async function login() {
      const username = authUsernameEl.value.trim();
      const password = authPasswordEl.value;
      if (!validateAuthForm()) {
        setAuthState('Please fix the highlighted fields', 'error');
        return;
      }
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok || !data.token) {
        if (res.status === 429 && data.retryAfter) {
          startRetryCountdown('Login blocked', data.retryAfter);
        } else {
          setAuthState(`Login failed: ${data.error || 'unknown error'}`, 'error');
        }
        showToast('Login failed', 'error');
        return;
      }
      setAuthToken(data.token);
      setRefreshToken(data.refreshToken || null);
      const me = await fetchMe();
      setAuthState(me ? `Logged in as ${me.username}` : 'Logged in', 'ok');
      updateResetButtonVisibility(me);
      showToast('Logged in');
      await loadPredictions();
      await loadChallenges();
    }

    async function restoreAuth() {
      const saved = localStorage.getItem('fg_token');
      const savedRefresh = localStorage.getItem('fg_refresh_token');
      setRefreshToken(savedRefresh || null);
      if (!saved) {
        setAuthState('Not logged in');
        return;
      }
      setAuthToken(saved);
      let me = await fetchMe();
      if (!me) {
        const refreshed = await refreshSession();
        if (!refreshed) {
          setAuthToken(null);
          setRefreshToken(null);
          setAuthState('Session expired. Please login again.', 'error');
          updateResetButtonVisibility(null);
          return;
        }
        me = await fetchMe();
      }
      if (!me) {
        setAuthState('Session expired. Please login again.', 'error');
        updateResetButtonVisibility(null);
        return;
      }
      setAuthState(`Logged in as ${me.username}`, 'ok');
      updateResetButtonVisibility(me);
    }

    function logout() {
      if (refreshToken) {
        fetch('/api/auth/logout', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ refreshToken })
        }).catch(() => null);
      }
      setAuthToken(null);
      setRefreshToken(null);
      predictionsEl.innerHTML = '<li>Login to view predictions</li>';
      setAuthState('Logged out');
      updateResetButtonVisibility(null);
      showToast('Logged out');
      renderChallengeAdmin();
    }

    async function loadLeaderboard() {
      const lb = await fetch('/api/leaderboard?limit=10').then(r => r.json());
      leaderboardEl.innerHTML = (lb.leaderboard || []).map(x => `<li>${x.user}: <strong>${x.score}</strong></li>`).join('') || '<li>No scores yet</li>';
    }

    async function loadChallenges() {
      const ch = await fetch('/api/challenges?includeInactive=1').then(r => r.json());
      allChallenges = ch.challenges || [];
      challengeNameById.clear();
      allChallenges.forEach((c) => challengeNameById.set(c.id, c.name));
      challengesEl.innerHTML = allChallenges.filter(x => x.active).map(x => (
        `<li class="challenge"><span>${x.name}</span><button class="btn" data-cid="${x.id}">Predict</button></li>`
      )).join('') || '<li>No active challenges</li>';
      document.querySelectorAll('[data-cid]').forEach((btn) => {
        btn.addEventListener('click', async () => {
          if (!authToken) {
            setAuthState('Login required to submit predictions', 'error');
            showToast('Login required', 'error');
            return;
          }
          const sandbox = compute(Number(sliderNews.value), Number(sliderSocial.value), Number(sliderVol.value));
          const res = await apiFetch('/api/predictions', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              challengeId: btn.dataset.cid,
              predictedScore: sandbox.score,
              predictedLabel: sandbox.label
            })
          }, true);
          if (!res.ok) {
            const body = await res.json().catch(() => ({}));
            showToast(body.error || 'Prediction failed', 'error');
            return;
          }
          await apiFetch('/api/events', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ type: 'prediction_submitted', challengeId: btn.dataset.cid, metadata: { source: 'ui', score: sandbox.score, label: sandbox.label } })
          }, true);
          btn.textContent = 'Submitted';
          btn.disabled = true;
          showToast('Prediction submitted');
          await loadPredictions();
          await loadLeaderboard();
        });
      });
      renderChallengeAdmin();
    }

    function renderChallengeAdmin() {
      if (!authToken) {
        challengeAdminStateEl.textContent = 'Login required';
        challengeAdminListEl.innerHTML = '<li>Login to manage challenges</li>';
        return;
      }
      challengeAdminStateEl.textContent = 'You can create, toggle, or delete challenges';
      challengeAdminListEl.innerHTML = allChallenges.map((c) => (
        `<li class="challenge">
          <span>
            <strong>${c.name}</strong> (${c.type}) - ${c.active ? 'active' : 'inactive'}
            <input class="auth-input" style="margin-top:6px;" data-edit-name="${c.id}" value="${c.name}">
            <input class="auth-input" style="margin-top:6px;" data-edit-type="${c.id}" value="${c.type}">
          </span>
          <span>
            <button class="btn" data-save-cid="${c.id}">Save</button>
            <button class="btn" data-toggle-cid="${c.id}" data-next="${c.active ? '0' : '1'}">${c.active ? 'Deactivate' : 'Activate'}</button>
            <button class="btn" data-del-cid="${c.id}">Delete</button>
          </span>
        </li>`
      )).join('') || '<li>No challenges</li>';

      document.querySelectorAll('[data-save-cid]').forEach((btn) => {
        btn.addEventListener('click', async () => {
          const id = btn.dataset.saveCid;
          const nameEl = document.querySelector(`[data-edit-name="${id}"]`);
          const typeEl = document.querySelector(`[data-edit-type="${id}"]`);
          const name = nameEl ? nameEl.value.trim() : '';
          const type = typeEl ? typeEl.value.trim() : '';
          if (!name || !type) {
            showToast('Name and type required', 'error');
            return;
          }
          const res = await apiFetch(`/api/challenges/${id}`, {
            method: 'PATCH',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({ name, type })
          }, true);
          if (!res.ok) {
            const body = await res.json().catch(() => ({}));
            showToast(body.error || 'Update failed', 'error');
            return;
          }
          showToast('Challenge updated');
          await loadChallenges();
        });
      });
      document.querySelectorAll('[data-toggle-cid]').forEach((btn) => {
        btn.addEventListener('click', async () => {
          const active = btn.dataset.next === '1';
          const res = await apiFetch(`/api/challenges/${btn.dataset.toggleCid}`, {
            method: 'PATCH',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({ active })
          }, true);
          if (!res.ok) {
            const body = await res.json().catch(() => ({}));
            showToast(body.error || 'Toggle failed', 'error');
            return;
          }
          showToast(active ? 'Challenge activated' : 'Challenge deactivated');
          await loadChallenges();
        });
      });
      document.querySelectorAll('[data-del-cid]').forEach((btn) => {
        btn.addEventListener('click', async () => {
          const res = await apiFetch(`/api/challenges/${btn.dataset.delCid}`, {
            method: 'DELETE',
            headers: {}
          }, true);
          if (!res.ok) {
            const body = await res.json().catch(() => ({}));
            showToast(body.error || 'Delete failed', 'error');
            return;
          }
          showToast('Challenge deleted');
          await loadChallenges();
        });
      });
    }

    async function loadPredictions() {
      if (!authToken) {
        predictionsEl.innerHTML = '<li>Login to view predictions</li>';
        return;
      }
      const res = await apiFetch('/api/predictions?limit=10', {}, true);
      if (!res.ok) {
        predictionsEl.innerHTML = '<li>Session expired. Login again</li>';
        return;
      }
      const data = await res.json();
      predictionsEl.innerHTML = (data.predictions || []).map((p) => {
        const status = p.status === 'scored' ? `scored (${p.points} pts)` : 'pending';
        const challengeName = challengeNameById.get(p.challengeId) || p.challengeId;
        return `<li>${challengeName}: <strong>${p.predictedScore}</strong> ${p.predictedLabel || ''} - ${status}</li>`;
      }).join('') || '<li>No predictions yet</li>';
    }

    async function loadInitial() {
      const s = await fetch('/api/sentiment/latest').then(r => r.json());
      liveLatest = s;
      render(s, s.source);
      sliderNews.value = s.components.news; sliderSocial.value = s.components.social; sliderVol.value = s.components.volatility;
      newsV.textContent = s.components.news; socialV.textContent = s.components.social; volV.textContent = s.components.volatility;
      const history = await fetch('/api/sentiment/history?limit=30').then(r => r.json());
      drawSpark((history.snapshots || []).map(x => x.score).reverse());
    }

    function connectWS() {
      const proto = location.protocol === 'https:' ? 'wss' : 'ws';
      const ws = new WebSocket(`${proto}://${location.host}/ws`);
      ws.onmessage = (event) => {
        const msg = JSON.parse(event.data);
        if (msg.type === 'sentiment') {
          liveLatest = msg.data;
          render(msg.data, msg.data.source);
        }
      };
      ws.onclose = () => setTimeout(connectWS, 1000);
    }

    sliderNews.addEventListener('input', updateSandbox);
    sliderSocial.addEventListener('input', updateSandbox);
    sliderVol.addEventListener('input', updateSandbox);
    document.getElementById('syncLive').addEventListener('click', () => {
      if (!liveLatest || !liveLatest.components) return;
      sliderNews.value = liveLatest.components.news;
      sliderSocial.value = liveLatest.components.social;
      sliderVol.value = liveLatest.components.volatility;
      updateSandbox();
    });
    document.getElementById('scorePending').addEventListener('click', async () => {
      if (!authToken) {
        setAuthState('Login required to score predictions', 'error');
        return;
      }
      await apiFetch('/api/predictions/score', { method: 'POST' }, true);
      showToast('Pending predictions scored');
      await loadPredictions();
      await loadLeaderboard();
    });
    document.getElementById('registerBtn').addEventListener('click', register);
    document.getElementById('loginBtn').addEventListener('click', login);
    forgotBtn.addEventListener('click', forgotPassword);
    resetPwdBtn.addEventListener('click', resetPassword);
    logoutBtn.addEventListener('click', logout);
    authUsernameEl.addEventListener('input', () => {
      paintFieldState(authUsernameEl, usernameErrEl, validateUsername(authUsernameEl.value.trim()));
    });
    authPasswordEl.addEventListener('input', () => {
      paintFieldState(authPasswordEl, passwordErrEl, validatePassword(authPasswordEl.value));
    });
    authUsernameEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        login();
      }
    });
    authPasswordEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        login();
      }
    });
    resetGuardsBtn.addEventListener('click', async () => {
      if (!authToken) {
        setAuthState('Login as admin to reset guards', 'error');
        showToast('Admin login required', 'error');
        return;
      }
      const username = authUsernameEl.value.trim();
      const res = await apiFetch('/api/auth/dev/reset-guards', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ username })
      }, true);
      const data = await res.json().catch(() => ({}));
      if (!res.ok) {
        setAuthState(data.error || 'Reset failed', 'error');
        showToast(data.error || 'Reset failed', 'error');
        return;
      }
      setAuthState('Login guards reset for current IP', 'ok');
      showToast('Login guards reset');
    });
    createChallengeBtn.addEventListener('click', async () => {
      if (!authToken) {
        challengeAdminStateEl.textContent = 'Login required';
        return;
      }
      const name = newChallengeNameEl.value.trim();
      const type = newChallengeTypeEl.value.trim();
      if (!name || !type) {
        challengeAdminStateEl.textContent = 'Name and type are required';
        return;
      }
      const res = await apiFetch('/api/challenges', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ name, type, active: true })
      }, true);
      if (!res.ok) {
        challengeAdminStateEl.textContent = 'Create failed';
        const body = await res.json().catch(() => ({}));
        showToast(body.error || 'Create failed', 'error');
        return;
      }
      newChallengeNameEl.value = '';
      newChallengeTypeEl.value = '';
      challengeAdminStateEl.textContent = 'Challenge created';
      showToast('Challenge created');
      await loadChallenges();
    });

    (async function boot() {
      await fetchAuthConfig();
      await restoreAuth();
      await loadLeaderboard();
      await loadChallenges();
      await loadPredictions();
      await loadInitial();
      connectWS();
    })();
  </script>
</body>
</html>
